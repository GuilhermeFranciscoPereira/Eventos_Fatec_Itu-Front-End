name: Deploy Frontend

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/guilhermefranciscopereira/eventos-fatec-itu-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_AUTHENTICATED_ROUTE=${{ secrets.NEXT_PUBLIC_AUTHENTICATED_ROUTE }}
            NEXT_PUBLIC_NOT_AUTHENTICATED_ROUTE=${{ secrets.NEXT_PUBLIC_NOT_AUTHENTICATED_ROUTE }}
            NEXT_PUBLIC_ACCESS_TOKEN=${{ secrets.NEXT_PUBLIC_ACCESS_TOKEN }}
            NEXT_PUBLIC_URL_API=${{ secrets.NEXT_PUBLIC_URL_API }}
            NEXT_PUBLIC_CLOUDINARY_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_NAME }}

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend on VPS
        run: |
          ssh -p ${{ secrets.VPS_PORT }} -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /opt/agenda-fatec-itu &&
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin &&
            docker compose pull frontend &&
            docker compose up -d frontend &&
            docker image prune -f &&
            docker compose ps &&
            df -h
          '